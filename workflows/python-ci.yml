# Reusable workflow: Python lint, type check, and test with coverage.
# Usage:
#   jobs:
#     python-ci:
#       uses: donny-devops/github-actions-templates/.github/workflows/python-ci.yml@main
#       with:
#         python_version: "3.12"
#         requirements_file: requirements.txt

name: Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.12"
      requirements_file:
        description: "Path to requirements file"
        required: false
        type: string
        default: "requirements.txt"
      working_directory:
        description: "Working directory"
        required: false
        type: string
        default: "."
      run_mypy:
        description: "Whether to run mypy type checking"
        required: false
        type: boolean
        default: false
      coverage_threshold:
        description: "Minimum test coverage percentage"
        required: false
        type: string
        default: "80"

jobs:
  lint-test:
    name: Lint & Test (Python ${{ inputs.python_version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: ${{ inputs.working_directory }}/${{ inputs.requirements_file }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ inputs.requirements_file }}
          pip install ruff pytest pytest-cov

      - name: Install mypy (if enabled)
        if: ${{ inputs.run_mypy }}
        run: pip install mypy

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        if: ${{ inputs.run_mypy }}
        run: mypy . --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage_threshold }} \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ inputs.python_version }}
          path: ${{ inputs.working_directory }}/coverage.xml
          retention-days: 7
