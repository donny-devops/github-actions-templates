# Reusable workflow: Terraform plan on PR, apply on merge to main.
# Uses OIDC for AWS authentication (no long-lived credentials).
# Usage:
#   jobs:
#     terraform:
#       uses: donny-devops/github-actions-templates/.github/workflows/terraform-plan-apply.yml@main  # noqa
#       with:
#         working_directory: ./infra/environments/prod
#         terraform_version: "1.7.5"
#         aws_region: us-east-1
#         aws_role_arn: arn:aws:iam::123456789012:role/github-actions-terraform
#       secrets: inherit

name: Terraform Plan / Apply

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing Terraform configuration"
        required: false
        type: string
        default: "."
      terraform_version:
        description: "Terraform version to use"
        required: false
        type: string
        default: "1.7.5"
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
      aws_role_arn:
        description: "IAM role ARN to assume via OIDC"
        required: true
        type: string
      apply:
        description: "Whether to run terraform apply (true on main branch)"
        required: false
        type: boolean
        default: false

jobs:
  terraform:
    name: Terraform ${{ inputs.apply && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # Required for OIDC
      pull-requests: write  # Required to post plan output as PR comment

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ inputs.working_directory }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (output truncated)'
              : planOutput;
            const body = `## Terraform Plan — \`${{ inputs.working_directory }}\`

            #### Format: \`${{ steps.fmt.outcome }}\`
            #### Init: \`${{ steps.init.outcome }}\`
            #### Validate: \`${{ steps.validate.outcome }}\`
            #### Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform Apply
        if: ${{ inputs.apply && steps.plan.outcome == 'success' }}
        run: terraform apply -input=false -auto-approve tfplan
